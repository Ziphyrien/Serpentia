name: Sync Cloudflare Worker types

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-worker-types.yml
      - bun.lock
      - package.json
      - wrangler.jsonc
  workflow_call:
  workflow_dispatch:

concurrency:
  group: sync-worker-types-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - run: bun install --frozen-lockfile
      - run: bun run cf-typegen

      - name: Commit generated types
        run: |
          if git diff --quiet -- worker-configuration.d.ts; then
            echo "Cloudflare Worker types are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker-configuration.d.ts
          git commit -m "chore: 更新 Cloudflare Worker 类型"
          git push origin HEAD:main
